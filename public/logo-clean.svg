<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6333C1" />
      <stop offset="100%" style="stop-color:#7B4AF4" />
    </linearGradient>
    <mask id="s-mask">
      <rect width="100" height="100" fill="white" />
      <!-- The crescent gap that characterizes the official design -->
      <path d="M 52 75 Q 60 75, 61 62 Q 56 70, 52 75" fill="black" />
    </mask>
  </defs>
  <!-- Rounded Square Isotype -->
  <rect width="100" height="100" rx="20" fill="url(#logo-grad)" />
  
  <!-- "S" path with surgical mask for the crescent gap -->
  <path d="M 68 35 
           C 68 22, 32 22, 32 37 
           C 32 48, 68 48, 68 60 
           C 68 72, 32 72, 32 78 
           C 32 88, 58 88, 61 74" 
        stroke="white" stroke-width="14" fill="none" stroke-linecap="round" mask="url(#s-mask)" />
  
  <!-- Simplified bold "it" text -->
  <text x="75" y="82" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="950" fill="white" text-anchor="middle">it</text>
</svg>
